<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git | Issues | Home</title>
     <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind+daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- geist font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-[#F8FAFC]">
    <header class="mb-10">
        <div class="navbar bg-base-100 shadow-sm flex justify-between">
              <div class="grid grid-cols-2 gap-1">
         <h2 class="text-md  sm:text-xl font-bold"><i class="fa-brands fa-github"></i> GitHub Issues Tracker</h2>
    </div>
  <div class="flex flex-col gap-2 sm:flex-row">
   <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input type="search" required placeholder="Search" />
</label>
      <div class="btn btn-primary">
           <button>+ New issue</button>
        </div>
    </div>
  </div>
</div>
    </header>

    <section id ="buttons" class="bg-white shadow-xl w-10/12 mx-auto p-6">
        <div class="mx-auto pb-5 flex flex-col sm:flex-row gap-3">
            <button id="allBtn" onclick="toggleBtn('allBtn')" class="btn btn-primary">All</button>
            <button id="openBtn" onclick="toggleBtn('openBtn')" class="btn">Open</button>
            <button id="closedBtn" onclick="toggleBtn('closedBtn')" class="btn">Closed</button>
        </div>
    </section>

    <section class="w-10/12 mx-auto mt-5 p-6 bg-white">
    <div class="flex justify-between pb-3 border-b-2 border-b-gray-300 flex-col gap-2 sm:flex-row ">
       <div class="flex gap-2">
          <div class="bg-purple-100 h-12 w-12 rounded-full flex justify-center items-center"><img src="./assets/Aperture.png" alt=""></div>
        <div>
         <h2 class="text-xl sm:text-2xl font-bold "><span id="issueCount" class="text-xl sm:text-2xl font-bold">50</span> issues</h2>
         <p class="text-[#64748B] text-sm sm:text-md">Track and manage your project issues</p>
      </div>
     </div>
     <div class="flex gap-4">
       <p><i class="fa-solid fa-circle text-green-600"></i> Open</p>
       <p><i class="fa-solid fa-circle text-purple-600"></i> Closed</p>
     </div>
    </div>

    <div id="all-card-container" class="py-5 bg-gray-50 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 justify-items-center">
    </div>

    <div id="open-card-container" class=" py-5 bg-gray-50 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 justify-items-center">

    </div>
    <div id="closed-card-container" class=" py-5 bg-gray-50 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 justify-items-center">

    </div>
    </section>

    <script src="/home.js"></script>
</body>
</html>
