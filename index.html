<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- tailwind+daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- geist font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="my-10 bg-[#F8FAFC]">
    <div class="min-h-[730px] max-w-md bg-white shadow-2xl mx-auto py-20 rounded-xl ">
        <div class="text-center space-y-2">
            <img class="mx-auto" src="./assets/github-logo.png" alt="">
            <h2 class="text-3xl font-semibold">GitHub Issues Tracker</h2>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>
      <fieldset
        class="fieldset w-md p-6">
        <label class="label text-black font-semibold">Username</label>
        <input id="inputUsername" type="email" class="input w-full" placeholder="Enter Username" />
        <p class="mb-3 text-blue-600">Default: admin</p>

        <label class="label text-black font-semibold">Password</label>
        <input id="inputPass" type="password" class="input w-full" placeholder="Enter Password" />
         <p class="text-blue-600">Default: admin123</p>

        <button onclick="loadHome()" class="btn btn-primary rounded-md mt-4 mb-4">Sign In</button>

        <div class="flex items-center justify-center gap-1 mb-3">
            <div class="flex-grow border border-t-1 border-gray-300"></div>
            <h2>OR</h2>
            <div class="flex-grow border border-t-1 border-gray-300"></div>
        </div>

        <div class="bg-[#F8FAFC] text-center">
            <p class="text-[#64748B] mb-4">Demo Credentials:</p>
            <p><span class="text-black font-bold">Username:</span> admin</p>
            <p><span class="text-black font-bold">Password:</span> admin123</p>
        </div>
      </fieldset>
    </div>

    <script src="./login.js"></script>
  </body>
</html>
